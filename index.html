              '100%': { opacity: '1', transform: 'translateY(0)' },

            'gradient-shift': {

    const { useState, useEffect, useRef } = React;

    const AccentBorder = ({ children, className = "", ringOnHover = false }) => {
      return (
        <div className={`relative rounded-full group ${className}`}>

            {children}

        </div>
      );
    };

    // --- Section 1: Loading Screen ---
    const LoadingScreen = ({ onComplete }) => {
      const [count, setCount] = useState(0);
      const [wordIndex, setWordIndex] = useState(0);
      const words = ["Design", "Create", "Inspire"];

      useEffect(() => {
        // Word cycling
        const wordInterval = setInterval(() => {
          setWordIndex((prev) => (prev + 1) % words.length);
        }, 900);

        // Counting animation
        const startTime = Date.now();
        const duration = 2700;

        const frame = () => {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);
          setCount(Math.floor(progress * 100));

          if (progress < 1) {
            requestAnimationFrame(frame);
          } else {
            setTimeout(onComplete, 400); // Delay after complete
          }
        };
        requestAnimationFrame(frame);

        return () => clearInterval(wordInterval);
      }, [onComplete]);

      return (
        <div className="fixed inset-0 z-[9999] bg-bg flex flex-col justify-between p-6 md:p-10 lg:p-16">
          {/* Top Left */}
          <motion.div
            initial={{ y: -20, opacity: 0 }}
            animate={{ y: 0, opacity: 1 }}
            transition={{ duration: 0.8 }}
            className="text-xs text-muted uppercase tracking-[0.3em]"
          >
            Portfolio
          </motion.div>

          {/* Center Rotating Words */}
          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center">
            <AnimatePresence mode="wait">
              <motion.h1
                key={words[wordIndex]}
                initial={{ y: 20, opacity: 0 }}
                animate={{ y: 0, opacity: 0.8 }}
                exit={{ y: -20, opacity: 0 }}
                transition={{ duration: 0.5 }}
                className="text-4xl md:text-6xl lg:text-7xl font-display italic text-text-primary/80"
              >
                {words[wordIndex]}
              </motion.h1>
            </AnimatePresence>
          </div>

          {/* Bottom Right Counter & Progress */}
          <div className="flex flex-col items-end">
            <div className="text-6xl md:text-8xl lg:text-9xl font-display tabular-nums text-text-primary mb-4">
              {String(count).padStart(3, "0")}
            </div>
            <div className="w-full max-w-[200px] h-[3px] bg-stroke/50 relative overflow-hidden">
              <motion.div
                className="absolute inset-y-0 left-0 accent-gradient shadow-[0_0_8px_rgba(137,170,204,0.35)]"
                initial={{ scaleX: 0 }}
                animate={{ scaleX: count / 100 }}
                style={{ transformOrigin: 'left' }}
              />
            </div>
          </div>
        </div>
      );
    };

    // --- Section 2: Hero ---

          hls.attachMedia(video);

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {skills.map((skill, i) => (
                <div key={i} className="flex flex-col gap-2 p-6 rounded-3xl bg-surface/30 border border-stroke hover:border-stroke/80 transition-all duration-300">
                  <h4 className="text-lg font-medium text-text-primary">{skill.category}</h4>
                  <p className="text-sm text-muted">{skill.items}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    // --- Section 5: Explorations (Parallax) ---
    const Explorations = () => {
      const pinRef = useRef(null);

      useEffect(() => {
        const ctx = gsap.context(() => {
          let mm = gsap.matchMedia();

          mm.add("(min-width: 768px)", () => {
            // Pin the section
            ScrollTrigger.create({
              trigger: pinRef.current,
              start: "top top",
              end: "+=1500",
              pin: true,
              scrub: 1,
            });

            // Parallax columns
            gsap.to(".col-left", {
              y: -300,
              ease: "none",
              scrollTrigger: {
                trigger: pinRef.current,
                start: "top top",
                end: "bottom top",
                scrub: 1
              }
            });

            gsap.fromTo(".col-right",
              { y: -300 },
              { y: 0, ease: "none", scrollTrigger: { trigger: pinRef.current, start: "top top", end: "bottom top", scrub: 1 } }
            );
          });
        }, pinRef);
        return () => ctx.revert();
      }, []);

      const images = [
        "./images/25f406e2-871e-4cf3-9f89-08d82e3d9859%202.JPG",
        "./images/IMG_5372.jpg",
        "./images/IMG_6604.jpg",
        "./images/IMG_6610.jpg",
        "./images/23d70b24-90a1-4a53-b075-e7653c77749e.jpg"
      ];

      return (
        <section ref={pinRef} className="relative min-h-screen w-full bg-transparent overflow-hidden flex flex-col justify-center items-center">
          {/* Content */}
          <div className="relative z-20 text-center px-4 mb-20 pointer-events-none">
            <p className="text-accent-gradient text-sm font-bold uppercase tracking-widest mb-4">Milestones</p>
            <h2 className="text-5xl md:text-7xl font-display italic">Personal <span className="text-text-primary">Achievements</span></h2>
            <p className="text-muted max-w-md mx-auto mt-4">A glimpse into my journey, team events, and proudest moments.</p>
          </div>

          {/* Parallax Grid */}
          <div className="relative z-10 flex md:grid md:grid-cols-2 flex-col gap-8 md:gap-40 max-w-[1400px] px-4 md:px-6 mt-10">
            <div className="col-left flex flex-col items-center md:items-end gap-8 md:gap-12">
              {images.slice(0, 3).map((src, i) => (
                <div key={i} className="w-[70vw] sm:w-[200px] md:w-[320px] aspect-square rounded-2xl overflow-hidden border border-stroke/30 rotate-2 md:rotate-3 hover:rotate-0 transition-transform duration-500 cursor-pointer">
                  <img src={src} className="w-full h-full object-cover" alt="Exploration" />
                </div>
              ))}
            </div>
            <div className="col-right flex flex-col items-center md:items-start gap-8 md:gap-12 pt-0 md:pt-24">
              {images.slice(3, 6).map((src, i) => (
                <div key={i} className="w-[70vw] sm:w-[200px] md:w-[320px] aspect-square rounded-2xl overflow-hidden border border-stroke/30 -rotate-2 md:-rotate-3 hover:rotate-0 transition-transform duration-500 cursor-pointer">
                  <img src={src} className="w-full h-full object-cover" alt="Exploration" />
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    // --- Section 6: Stats ---
    const StatItem = ({ stat }) => {
      const numRef = useRef(null);
      
      useEffect(() => {
        if (typeof stat.value === "number" && numRef.current) {
          let ctx = gsap.context(() => {
            gsap.fromTo(numRef.current, 
              { innerHTML: 0 },
              { 
                innerHTML: stat.value, 
                duration: 2.5, 
                snap: { innerHTML: 1 }, 
                ease: "power3.out",
                scrollTrigger: {
                  trigger: numRef.current,
                  start: "top 85%"
                }
              }
            );
          }, numRef);
          return () => ctx.revert();
        }
      }, [stat]);

      return (
        <div>
          <h3 className="text-5xl md:text-6xl font-display italic text-text-primary mb-2">
            {typeof stat.value === "number" ? <span ref={numRef}>0</span> : stat.value}
            <span className="text-accent-gradient">{stat.suffix}</span>
          </h3>
          <p className="text-muted uppercase tracking-widest text-xs">{stat.label}</p>
        </div>
      );
    };

    const Stats = () => {
      const stats = [
        { value: 14, suffix: "+", label: "Projects Built" },
        { value: 16, suffix: "+", label: "Technologies" },
        { value: "Active", suffix: "", label: "Open Source Contributor" },
      ];

      return (
        <section className="bg-transparent py-16 md:py-24 border-t border-stroke/30">
          <div className="max-w-[1200px] mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
            {stats.map((stat, i) => (
              <StatItem key={i} stat={stat} />
            ))}
          </div>
        </section>
      );
    };

    // --- Section 7: Footer ---
    const Footer = () => {
      const marqueeRef = useRef(null);
      const videoRef = useRef(null);

      useEffect(() => {
        // Initialize HLS for footer video
        if (Hls.isSupported() && videoRef.current) {
          const hls = new Hls();
          hls.loadSource('https://stream.mux.com/Aa02T7oM1wH5Mk5EEVDYhbZ1ChcdhRsS2m1NYyx4Ua1g.m3u8');
          hls.attachMedia(videoRef.current);
          hls.on(Hls.Events.MANIFEST_PARSED, function () {
            videoRef.current.play();
          });
        } else if (videoRef.current && videoRef.current.canPlayType('application/vnd.apple.mpegurl')) {
          videoRef.current.src = 'https://stream.mux.com/Aa02T7oM1wH5Mk5EEVDYhbZ1ChcdhRsS2m1NYyx4Ua1g.m3u8';
          videoRef.current.addEventListener('loadedmetadata', function () {
            videoRef.current.play();
          });
        }

        gsap.to(marqueeRef.current, {
          xPercent: -50,
          repeat: -1,
          duration: 40,
          ease: "none"
        });
      }, []);

      return (
        <footer className="relative bg-bg pt-20 pb-24 md:pb-12 overflow-hidden">
          {/* Video Background (Flipped) */}
          <div className="absolute inset-0 overflow-hidden pointer-events-none scale-y-[-1] z-0">
            <video
              ref={videoRef}
              autoPlay
              muted
              loop
              playsInline
              className="absolute top-0 left-0 w-full h-[100vh] object-cover"
            />
            <div className="absolute inset-0 bg-black/40"></div>
          </div>

          <div className="relative z-10 flex flex-col items-center">
            {/* Marquee */}
            <div className="overflow-hidden w-full whitespace-nowrap mb-16 mask-linear-fade">
              <div ref={marqueeRef} className="inline-block">
                <span className="text-6xl md:text-9xl font-display italic text-text-primary/20 mx-4">
                  BUILDING THE FUTURE •
                </span>
                <span className="text-6xl md:text-9xl font-display italic text-text-primary/20 mx-4">
                  BUILDING THE FUTURE •
                </span>
                <span className="text-6xl md:text-9xl font-display italic text-text-primary/20 mx-4">
                  BUILDING THE FUTURE •
                </span>
                <span className="text-6xl md:text-9xl font-display italic text-text-primary/20 mx-4">
                  BUILDING THE FUTURE •
                </span>
                <span className="text-6xl md:text-9xl font-display italic text-text-primary/20 mx-4">
                  BUILDING THE FUTURE •
                </span>
                {/* Duplicate for seamless loop */}
                <span className="text-6xl md:text-9xl font-display italic text-text-primary/20 mx-4">
                  BUILDING THE FUTURE •
                </span>
                <span className="text-6xl md:text-9xl font-display italic text-text-primary/20 mx-4">
                  BUILDING THE FUTURE •
                </span>
                <span className="text-6xl md:text-9xl font-display italic text-text-primary/20 mx-4">
                  BUILDING THE FUTURE •
                </span>
                <span className="text-6xl md:text-9xl font-display italic text-text-primary/20 mx-4">
                  BUILDING THE FUTURE •
                </span>
                <span className="text-6xl md:text-9xl font-display italic text-text-primary/20 mx-4">
                  BUILDING THE FUTURE •
                </span>
              </div>
            </div>

            {/* CTA */}
            <a
              href="mailto:amanmemon0014@gmail.com"
              className="relative inline-block px-10 py-5 rounded-full text-xl md:text-2xl font-medium text-text-primary border border-stroke/50 hover:border-transparent transition-all group mb-16"
            >
              <span className="relative z-10">Let's build something great</span>
              <span className="absolute inset-[-2px] rounded-full accent-gradient opacity-0 group-hover:opacity-100 transition-opacity blur-[2px]"></span>
            </a>

            {/* Footer Bar */}
            <div className="w-full max-w-[1200px] px-6 border-t border-stroke/20 pt-8 flex flex-col md:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-6 text-sm text-text-primary/70">
                <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                Available for projects
              </div>
              <div className="flex flex-wrap justify-center gap-4 md:gap-6 mt-4 md:mt-0">
                {[
                  { name: 'Email', url: 'mailto:amanmemon0014@gmail.com' },
                  { name: 'Phone', url: 'tel:+919265588226' },
                  { name: 'GitHub', url: 'https://github.com/amanComeerciax' },
                  { name: 'LinkedIn', url: 'https://www.linkedin.com/in/mohammad-aman-memon/' }
                ].map(social => (
                  <a key={social.name} href={social.url} target={social.name !== 'Email' ? '_blank' : undefined} rel={social.name !== 'Email' ? 'noopener noreferrer' : undefined} className="text-sm text-text-primary/70 hover:text-white transition-colors">{social.name}</a>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );
    };

    // --- Main App ---
    const App = () => {
      const [isLoading, setIsLoading] = useState(true);

      useEffect(() => {
        const lenis = new Lenis({
          duration: 1.2,
          easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
          direction: 'vertical',
          gestureDirection: 'vertical',
          smooth: true,
          mouseMultiplier: 1,
          smoothTouch: false,
          touchMultiplier: 2,
        });

        function raf(time) {
          lenis.raf(time);
          requestAnimationFrame(raf);
        }

        requestAnimationFrame(raf);

        // Sync with GSAP ScrollTrigger
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => {
          lenis.raf(time * 1000);
        });
        gsap.ticker.lagSmoothing(0);

        return () => {
          lenis.destroy();
        };
      }, []);

      return (
        <>
          {/* Global Background Effects */}
          <div className="fixed inset-0 pointer-events-none z-0 bg-grid opacity-70"></div>

          {isLoading && <LoadingScreen onComplete={() => setIsLoading(false)} />}

          <div className={`relative z-10 transition-opacity duration-700 ${isLoading ? 'opacity-0' : 'opacity-100'}`}>
            <Hero />
            <SelectedWorks />
            <CoreSkills />
            <Explorations />
            <Stats />
            <Footer />
          </div>
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
